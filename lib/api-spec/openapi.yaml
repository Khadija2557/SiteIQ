openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SiteIQ Construction Site Coordination API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: workers
    description: Worker management
  - name: machines
    description: Machine management
  - name: tasks
    description: Task management
  - name: hazards
    description: Hazard management
  - name: alerts
    description: Alert management
  - name: deliveries
    description: Delivery management
  - name: cameras
    description: Camera feeds
  - name: robots
    description: Robot management
  - name: reports
    description: Report management
  - name: dashboard
    description: Dashboard aggregates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /workers:
    get:
      operationId: listWorkers
      tags: [workers]
      summary: List all workers
      parameters:
        - name: zone
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Worker"
    post:
      operationId: createWorker
      tags: [workers]
      summary: Create a worker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerInput"
      responses:
        "201":
          description: Worker created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"

  /workers/{id}:
    get:
      operationId: getWorker
      tags: [workers]
      summary: Get worker by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
    patch:
      operationId: updateWorker
      tags: [workers]
      summary: Update worker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerUpdate"
      responses:
        "200":
          description: Worker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
    delete:
      operationId: deleteWorker
      tags: [workers]
      summary: Delete worker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workers/stats/summary:
    get:
      operationId: getWorkerStats
      tags: [workers]
      summary: Worker statistics summary
      responses:
        "200":
          description: Worker stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerStats"

  /machines:
    get:
      operationId: listMachines
      tags: [machines]
      summary: List all machines
      parameters:
        - name: zone
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Machines list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
    post:
      operationId: createMachine
      tags: [machines]
      summary: Create a machine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineInput"
      responses:
        "201":
          description: Machine created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"

  /machines/{id}:
    get:
      operationId: getMachine
      tags: [machines]
      summary: Get machine by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Machine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
    patch:
      operationId: updateMachine
      tags: [machines]
      summary: Update machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineUpdate"
      responses:
        "200":
          description: Machine updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: zone
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/stats/summary:
    get:
      operationId: getTaskStats
      tags: [tasks]
      summary: Task statistics
      responses:
        "200":
          description: Task stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStats"

  /hazards:
    get:
      operationId: listHazards
      tags: [hazards]
      summary: List hazards
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
        - name: severity
          in: query
          schema:
            type: string
        - name: zone
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Hazards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hazard"
    post:
      operationId: createHazard
      tags: [hazards]
      summary: Create a hazard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HazardInput"
      responses:
        "201":
          description: Hazard created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hazard"

  /hazards/{id}:
    patch:
      operationId: updateHazard
      tags: [hazards]
      summary: Update hazard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HazardUpdate"
      responses:
        "200":
          description: Hazard updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hazard"

  /hazards/{id}/resolve:
    post:
      operationId: resolveHazard
      tags: [hazards]
      summary: Resolve a hazard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hazard resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hazard"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts
      parameters:
        - name: acknowledged
          in: query
          schema:
            type: boolean
        - name: severity
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /deliveries:
    get:
      operationId: listDeliveries
      tags: [deliveries]
      summary: List deliveries
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Deliveries list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Delivery"
    post:
      operationId: createDelivery
      tags: [deliveries]
      summary: Create a delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryInput"
      responses:
        "201":
          description: Delivery created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/{id}:
    patch:
      operationId: updateDelivery
      tags: [deliveries]
      summary: Update delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryUpdate"
      responses:
        "200":
          description: Delivery updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /cameras:
    get:
      operationId: listCameras
      tags: [cameras]
      summary: List camera feeds
      responses:
        "200":
          description: Camera feeds list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Camera"

  /robots:
    get:
      operationId: listRobots
      tags: [robots]
      summary: List robots
      responses:
        "200":
          description: Robots list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Robot"

  /robots/{id}:
    patch:
      operationId: updateRobot
      tags: [robots]
      summary: Update robot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RobotUpdate"
      responses:
        "200":
          description: Robot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Robot"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List reports
      responses:
        "200":
          description: Reports list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary statistics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent site activity feed
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/zones:
    get:
      operationId: getZoneStatus
      tags: [dashboard]
      summary: Zone-by-zone status breakdown
      responses:
        "200":
          description: Zone statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneStatus"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, role, tenantId]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        tenantId:
          type: integer
        createdAt:
          type: string

    Worker:
      type: object
      required: [id, name, trade, status, zone, ppeScore, fatigueScore, tenantId]
      properties:
        id:
          type: integer
        name:
          type: string
        trade:
          type: string
        certifications:
          type: array
          items:
            type: string
        zone:
          type: string
        status:
          type: string
        ppeScore:
          type: integer
        fatigueScore:
          type: integer
        locationX:
          type: ["number", "null"]
        locationY:
          type: ["number", "null"]
        shiftStart:
          type: ["string", "null"]
        userId:
          type: ["integer", "null"]
        tenantId:
          type: integer

    WorkerInput:
      type: object
      required: [name, trade, zone]
      properties:
        name:
          type: string
        trade:
          type: string
        certifications:
          type: array
          items:
            type: string
        zone:
          type: string
        status:
          type: string
        ppeScore:
          type: integer
        fatigueScore:
          type: integer
        locationX:
          type: number
        locationY:
          type: number
        shiftStart:
          type: string

    WorkerUpdate:
      type: object
      properties:
        name:
          type: string
        trade:
          type: string
        zone:
          type: string
        status:
          type: string
        ppeScore:
          type: integer
        fatigueScore:
          type: integer
        locationX:
          type: number
        locationY:
          type: number

    WorkerStats:
      type: object
      required: [total, active, onBreak, offSite, avgPpeScore, avgFatigueScore, byZone]
      properties:
        total:
          type: integer
        active:
          type: integer
        onBreak:
          type: integer
        offSite:
          type: integer
        avgPpeScore:
          type: number
        avgFatigueScore:
          type: number
        byZone:
          type: array
          items:
            type: object
            required: [zone, count]
            properties:
              zone:
                type: string
              count:
                type: integer

    Machine:
      type: object
      required: [id, name, type, status, zone, tenantId]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        status:
          type: string
        zone:
          type: string
        locationX:
          type: ["number", "null"]
        locationY:
          type: ["number", "null"]
        operatorId:
          type: ["integer", "null"]
        utilizationPct:
          type: ["integer", "null"]
        maintenanceDue:
          type: ["string", "null"]
        tenantId:
          type: integer

    MachineInput:
      type: object
      required: [name, type, zone]
      properties:
        name:
          type: string
        type:
          type: string
        status:
          type: string
        zone:
          type: string
        locationX:
          type: number
        locationY:
          type: number
        utilizationPct:
          type: integer
        maintenanceDue:
          type: string

    MachineUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
        zone:
          type: string
        utilizationPct:
          type: integer
        maintenanceDue:
          type: string

    Task:
      type: object
      required: [id, title, status, priority, zone, tenantId]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        priority:
          type: string
        assignedWorkerId:
          type: ["integer", "null"]
        zone:
          type: string
        toolsRequired:
          type: array
          items:
            type: string
        estimatedMinutes:
          type: ["integer", "null"]
        deadline:
          type: ["string", "null"]
        dependencies:
          type: array
          items:
            type: integer
        tenantId:
          type: integer

    TaskInput:
      type: object
      required: [title, zone, priority]
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        assignedWorkerId:
          type: integer
        zone:
          type: string
        toolsRequired:
          type: array
          items:
            type: string
        estimatedMinutes:
          type: integer
        deadline:
          type: string

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        assignedWorkerId:
          type: integer
        zone:
          type: string
        estimatedMinutes:
          type: integer
        deadline:
          type: string

    TaskStats:
      type: object
      required: [total, todo, inProgress, blocked, complete, byPriority, byZone]
      properties:
        total:
          type: integer
        todo:
          type: integer
        inProgress:
          type: integer
        blocked:
          type: integer
        complete:
          type: integer
        byPriority:
          type: array
          items:
            type: object
            required: [priority, count]
            properties:
              priority:
                type: string
              count:
                type: integer
        byZone:
          type: array
          items:
            type: object
            required: [zone, count]
            properties:
              zone:
                type: string
              count:
                type: integer

    Hazard:
      type: object
      required: [id, type, severity, zone, active, detectedAt, tenantId]
      properties:
        id:
          type: integer
        type:
          type: string
        severity:
          type: string
        zone:
          type: string
        locationX:
          type: ["number", "null"]
        locationY:
          type: ["number", "null"]
        description:
          type: ["string", "null"]
        active:
          type: boolean
        detectedAt:
          type: string
        resolvedAt:
          type: ["string", "null"]
        tenantId:
          type: integer

    HazardInput:
      type: object
      required: [type, severity, zone]
      properties:
        type:
          type: string
        severity:
          type: string
        zone:
          type: string
        locationX:
          type: number
        locationY:
          type: number
        description:
          type: string

    HazardUpdate:
      type: object
      properties:
        type:
          type: string
        severity:
          type: string
        zone:
          type: string
        description:
          type: string
        active:
          type: boolean

    Alert:
      type: object
      required: [id, type, severity, message, acknowledged, createdAt, tenantId]
      properties:
        id:
          type: integer
        type:
          type: string
        severity:
          type: string
        message:
          type: string
        workerId:
          type: ["integer", "null"]
        machineId:
          type: ["integer", "null"]
        zone:
          type: ["string", "null"]
        acknowledged:
          type: boolean
        acknowledgedBy:
          type: ["integer", "null"]
        createdAt:
          type: string
        tenantId:
          type: integer

    Delivery:
      type: object
      required: [id, materialType, quantity, status, gate, tenantId]
      properties:
        id:
          type: integer
        materialType:
          type: string
        quantity:
          type: integer
        eta:
          type: ["string", "null"]
        status:
          type: string
        gate:
          type: string
        assignedForkLiftId:
          type: ["integer", "null"]
        tenantId:
          type: integer

    DeliveryInput:
      type: object
      required: [materialType, quantity, gate]
      properties:
        materialType:
          type: string
        quantity:
          type: integer
        eta:
          type: string
        status:
          type: string
        gate:
          type: string
        assignedForkLiftId:
          type: integer

    DeliveryUpdate:
      type: object
      properties:
        materialType:
          type: string
        quantity:
          type: integer
        eta:
          type: string
        status:
          type: string
        gate:
          type: string

    Camera:
      type: object
      required: [id, name, zone, status, tenantId]
      properties:
        id:
          type: integer
        name:
          type: string
        rtspUrl:
          type: ["string", "null"]
        zone:
          type: string
        status:
          type: string
        lastFrameAt:
          type: ["string", "null"]
        tenantId:
          type: integer

    Robot:
      type: object
      required: [id, name, type, status, tenantId]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        status:
          type: string
        apiKey:
          type: ["string", "null"]
        currentTaskId:
          type: ["integer", "null"]
        tenantId:
          type: integer

    RobotUpdate:
      type: object
      properties:
        status:
          type: string
        currentTaskId:
          type: integer

    Report:
      type: object
      required: [id, type, date, tenantId]
      properties:
        id:
          type: integer
        type:
          type: string
        date:
          type: string
        pdfUrl:
          type: ["string", "null"]
        dataJson:
          type: object
        tenantId:
          type: integer

    DashboardSummary:
      type: object
      required: [activeWorkers, totalWorkers, activeMachines, totalMachines, openTasks, completedTasks, activeHazards, unresolvedAlerts, pendingDeliveries, siteHealthScore]
      properties:
        activeWorkers:
          type: integer
        totalWorkers:
          type: integer
        activeMachines:
          type: integer
        totalMachines:
          type: integer
        openTasks:
          type: integer
        completedTasks:
          type: integer
        activeHazards:
          type: integer
        unresolvedAlerts:
          type: integer
        pendingDeliveries:
          type: integer
        siteHealthScore:
          type: integer
        criticalHazards:
          type: integer
